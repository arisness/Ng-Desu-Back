name: Build and Deploy

on:
  push:
    branches:
      - main          # Triggers on every push to main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/ngdesu:${{ github.ref_name }}

jobs:
  # ============================================================
  #  Build with the Dockerfile & push the container
  # ============================================================
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Runs the Dockerfile using GitHub's servers
      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  #  Deploy to VPS
  # ============================================================
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Create App Directory on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: mkdir -p ~/ngdesu

      - name: Copy app docker-compose.yml to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/${{ secrets.VPS_USER }}/ngdesu"

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_IP }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GITHUB_REF_NAME
          script: |
            # =========================
            #   App Deployment
            # =========================
            # Move to the app's directory
            cd ~/ngdesu

            # Ensure .env exists
            touch .env

            # Delete any existing lines that start with IMAGE_TAG=
            sed -i '/^IMAGE_TAG=/d' .env

            # Append BUSINESS_NAME & IMAGE_TAG
            echo "IMAGE_TAG=${GITHUB_REF_NAME}" >> .env

            # Log into GHCR on the VPS so it's authorized to pull the image
            echo "${{ secrets.GH_PAT }}" | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

            # Pull the brand new image and restart the containers
            docker compose pull
            docker compose up -d

            # Clean up old images to save space
            docker system prune -f